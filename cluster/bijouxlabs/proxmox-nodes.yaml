---
# Services (headless — backends are physical Proxmox hosts via Endpoints)
apiVersion: v1
kind: Service
metadata:
  name: proxmox
  namespace: bijouxlabs
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 8006
      targetPort: 8006
---
apiVersion: v1
kind: Service
metadata:
  name: node01m910
  namespace: bijouxlabs
spec:
  type: ClusterIP
