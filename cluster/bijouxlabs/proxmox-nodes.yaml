      port: 8006
      targetPort: 8006
---
# Endpoints — map services to physical Proxmox host IPs
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox
  namespace: bijouxlabs
subsets:
  - addresses:
      - ip: 192.168.0.110
    ports:
      - name: https
        port: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: node01m910
  namespace: bijouxlabs
subsets:
  - addresses:
      - ip: 192.168.0.211
    ports:
      - name: https
        port: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: node02m910
  namespace: bijouxlabs
subsets:
  - addresses:
      - ip: 192.168.0.212
    ports:
      - name: https
        port: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: node03m920
  namespace: bijouxlabs
subsets:
  - addresses:
      - ip: 192.168.0.213
    ports:
      - name: https
        port: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: node04g4800
  namespace: bijouxlabs
subsets:
