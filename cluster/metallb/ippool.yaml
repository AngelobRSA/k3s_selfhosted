apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: lan-pool
  namespace: metallb-system
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: ignore
spec:
  addresses:
    - 192.168.0.160-192.168.0.170
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: lan-adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - lan-pool
