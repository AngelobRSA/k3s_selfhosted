apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 12h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  releaseName: traefik
  chart:
    spec:
      chart: traefik
      version: 37.1.2
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  interval: 30m
  values:
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/loadBalancerIPs: "192.168.0.169"
      spec:
        # MUST live under service.spec — this chart passes service.spec through
        # to the Service verbatim. Setting it as service.externalTrafficPolicy
        # (one level up) is silently discarded by Helm, which is why this
        # cluster ran Cluster policy while the config asked for Local.
        #
        # Local stops MetalLB announcing from nodes with no ready Traefik
        # endpoint, which removes the cross-node hop and its masquerade. Under
        # Cluster the real client IP was replaced by the announcing node's
        # cilium_host address, so access logs and X-Forwarded-For were useless.
        externalTrafficPolicy: Local
    deployment:
      # 3 replicas: under Local only nodes running a Traefik pod are eligible
      # to announce 192.168.0.169, so replica count is now availability, not
      # just capacity.
      replicas: 3
    resources:
      requests:
        cpu: 10m
        memory: 200Mi
        ephemeral-storage: 50Mi
    tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 60
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 60
    # Replaces the previous preferredDuringScheduling podAntiAffinity, which was
    # only a soft hint — nothing stopped all replicas landing on one node. Under
    # externalTrafficPolicy: Local that node would become the sole announcer AND
    # the sole server for all ingress. DoNotSchedule makes the spread a hard
    # guarantee, so there are always distinct eligible announcers.
    #
    # Hostname spread alone is hypervisor-blind: 3 distinct nodes can still be
    # kmaster03 + kworker06 + kworker08, all on node03m920. One host reboot and
    # every announcer for 192.168.0.169 disappears at once.
    #
    topologySpreadConstraints:
      # Floor: hard guarantee of 3 distinct VMs. Kept even though the zone rule
      # below is stronger in principle — an unlabelled node is invisible to a
      # zone constraint, so this is what holds if a label ever goes missing.
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
      # Ceiling: prefer 3 distinct Proxmox hosts. Soft on purpose — with 5
      # zones and 3 replicas this is satisfiable in steady state, but during a
      # two-host maintenance window there is zero slack, and DoNotSchedule
      # would deadlock a rolling update precisely when announcers are scarcest.
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
    tlsStore:
      default:
        defaultCertificate:
          secretName: bijouxlabs-wildcard-tls
    additionalArguments:
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--providers.kubernetescrd.allowCrossNamespace=true"
      - "--serversTransport.insecureSkipVerify=true"
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik
