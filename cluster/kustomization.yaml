apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# BijouxLabs Cluster Configuration with Kustomize Replacements + SOPS
#
# This is the cluster entrypoint. All environment-specific values are stored in
# cluster/replacements.sops.yaml and applied cluster-wide via replacements.

resources:
  - kube-vip
  - metallb
  - cilium
  - traefik
  - longhorn
  - cnpg
  - replacements.sops.yaml

# Centralized Replacements mapping ConfigMap values to manifest fields
replacements:
  # Network Configuration
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.LB_IP_TRAEFIK
    targets:
      - select:
          kind: Service
          name: traefik
        fieldPaths:
          - metadata.annotations.metallb\.universe\.tf/loadBalancerIPs
  # Load Balancer IPs
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.LB_IP_OPENGIST
    targets:
      - select:
          kind: Service
          name: opengist
        fieldPaths:
          - metadata.annotations.metallb\.universe\.tf/loadBalancerIPs
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.LB_IP_TRAEFIK
    targets:
      - select:
          kind: Service
          name: traefik
        fieldPaths:
          - metadata.annotations.metallb\.universe\.tf/loadBalancerIPs
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.LB_IP_LONGHORN
    targets:
      - select:
          kind: Service
          name: longhorn-frontend-lb
        fieldPaths:
          - metadata.annotations.metallb\.universe\.tf/loadBalancerIPs
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.LB_IP_TAUC_SPEEDTEST
    targets:
      - select:
          kind: Service
          name: tauc-speedtest
        fieldPaths:
          - metadata.annotations.metallb\.universe\.tf/address-pool
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.LB_IP_HOMEASSISTANT
    targets:
      - select:
          kind: Service
          name: homeassistant
        fieldPaths:
          - metadata.annotations.metallb\.universe\.tf/loadBalancerIPs
  # Domain Configuration
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.DOMAIN_OPENGIST
    targets:
      - select:
          kind: Ingress
          name: opengist
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.DOMAIN_HOMEASSISTANT
    targets:
      - select:
          kind: Ingress
          name: homeassistant
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.TLS_CERT_RESOLVER
    targets:
      - select:
          kind: Ingress
        fieldPaths:
          - spec.annotations.cert\.manager\.io/cluster-issuer
          - spec.annotations.traefik\.io/router\.tls\.certresolver

  # Namespace Configuration
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.NAMESPACE_APPLICATIONS
    targets:
      - select:
          kind: Service
          name: opengist
        fieldPaths:
          - metadata.namespace
      - select:
          kind: Service
          name: tauc-speedtest
        fieldPaths:
          - metadata.namespace
      - select:
          kind: Service
          name: homeassistant
        fieldPaths:
          - metadata.namespace
      - select:
          kind: Service
          name: iperf3
        fieldPaths:
          - metadata.namespace
      - select:
          kind: Deployment
        fieldPaths:
          - metadata.namespace
      - select:
          kind: Ingress
        fieldPaths:
          - metadata.namespace
      - select:
          kind: PersistentVolumeClaim
        fieldPaths:
          - metadata.namespace
      - select:
          kind: ConfigMap
          name: tauc-speedtest
        fieldPaths:
          - metadata.namespace
      - select:
          kind: Endpoints
        fieldPaths:
          - metadata.namespace

  # Port Configuration
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.PORT_TAUC_SPEEDTEST
    targets:
      - select:
          kind: Service
          name: tauc-speedtest
        fieldPaths:
          - spec.ports.0.targetPort

  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.PORT_HOMEASSISTANT
    targets:
      - select:
          kind: Ingress
          name: homeassistant
        fieldPaths:
          - spec.rules.0.http.paths.0.backend.service.port.number
      - select:
          kind: Ingress
          name: homeassistant-external
        fieldPaths:
          - spec.rules.0.http.paths.0.backend.service.port.number

  # TLS Ingress Class Configuration
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.TLS_INGRESS_CLASS
    targets:
      - select:
          kind: Ingress
        fieldPaths:
          - spec.ingressClassName

  # Domain Configuration - OpenGist
  - source:
      kind: ConfigMap
      name: bijouxlabs-replacements
      fieldPath: data.DOMAIN_OPENGIST
    targets:
      - select:
          kind: Ingress
          name: opengist
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
      - select:
          kind: Deployment
          name: opengist
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=domain].value

