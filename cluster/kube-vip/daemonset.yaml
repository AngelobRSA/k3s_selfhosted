apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
spec:
  selector:
    matchLabels: { app: kube-vip }
  template:
    metadata:
      labels: { app: kube-vip }
    spec:
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 0
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: kube-vip
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v1.2.0
          args:
            - manager
            - --arp
            - --controlplane
            - --leaderElection
            # --interface omitted on purpose: kube-vip auto-detects the global-scope
            # NIC per node, so this works on both the legacy ens18 masters and the
            # Rocky-cloud-image (eth0) masters with no per-node config. Every master
            # is single-NIC, so detection is unambiguous.
            - --vip=192.168.0.220
            - --vipSubnet=32
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "10.43.0.1"
            - name: KUBERNETES_SERVICE_PORT
              value: "443"
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 200Mi
          securityContext:
            capabilities:
              add: ["NET_ADMIN","NET_RAW"]
