apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 12h
  url: https://helm.cilium.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  chart:
    spec:
      chart: cilium
      version: "1.15.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  interval: 30m
  timeout: 10m
  values:
    k8sServiceHost: 192.168.0.154
    k8sServicePort: 6443
    kubeProxyReplacement: disabled

    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
