apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: Always
          command: ["uv", "run", "arq", "workers.memory_worker.WorkerSettings"]
          env:
            - name: REDIS_URL
              value: redis://redis.{{ .Release.Namespace }}.svc.cluster.local:6379
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.url }}
            - name: APP_ENV
              value: production
          envFrom:
            - secretRef:
                name: stefhq-secret
          resources: {{ toYaml .Values.worker.resources | nindent 12 }}
