apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db
  namespace: immich
spec:
  # 2 instances = primary + hot standby. Required for graceful node drains:
  # with instances=1 CNPG's minAvailable=1 PDB can never permit evicting the
  # primary (no standby to promote), which deadlocks `kubectl drain` until it
  # times out. With a standby, CNPG performs a switchover instead.
  instances: 2
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-1.1.1
  postgresql:
    shared_preload_libraries:
      - vchord
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: immich
      owner: app
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
        - CREATE EXTENSION IF NOT EXISTS cube CASCADE;
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
