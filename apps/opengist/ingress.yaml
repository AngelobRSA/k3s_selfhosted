apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opengist
  namespace: $(NAMESPACE_APPLICATIONS)
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: bijouxlabs-allow-ha-lan@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: opengist.bijouxlabs.cc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opengist
            port:
              number: 6157
  tls:
  - hosts:
    - opengist.bijouxlabs.cc