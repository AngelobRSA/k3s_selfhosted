apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Bijoux Labs
    theme: dark
    color: slate
    headerStyle: boxed
    cardBlur: sm
    hideVersion: true
    statusStyle: dot

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: k3s
        nodes:
          show: false
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23
    - search:
        provider: duckduckgo
        target: https://www.duckduckgo.com

  services.yaml: |
    - Media:
        - Immich:
            href: https://photos.bijouxlabs.cc
            description: Photo management & facial recognition
            icon: immich.png
            siteMonitor: https://photos.bijouxlabs.cc
    - Data Management:
        - Opengist:
            href: https://opengist.bijouxlabs.cc
            description: Notes & Gists
            icon: opengist.png
            siteMonitor: https://opengist.bijouxlabs.cc
        - Copyparty:
            href: https://files.bijouxlabs.cc
            description: Fileshare
            icon: copyparty.png
            siteMonitor: https://files.bijouxlabs.cc
        - PaperlessNGX:
            href: https://paperless.bijouxlabs.cc
            description: Document store
            icon: paperless.png
            siteMonitor: https://paperless.bijouxlabs.cc
        - Qdrant:
            href: https://qdrant.bijouxlabs.cc/dashboard
            description: Self-hosted VectorDB
            icon: qdrant.png
            siteMonitor: https://qdrant.bijouxlabs.cc/dashboard
        - OCIS:
            href: https://drive.bijouxlabs.cc
            description: Self-hosted drive & file sync
            icon: owncloud.png
            siteMonitor: https://drive.bijouxlabs.cc

    - Web Tools:
        - Vaultwarden:
            href: https://vaultwarden.bijouxlabs.cc
            description: Self-hosted password manager
            icon: vaultwarden.png
            siteMonitor: https://vaultwarden.bijouxlabs.cc

    - Infrastructure:
        - Traefik:
            href: https://traefik.bijouxlabs.cc/ping
            description: Reverse proxy
            icon: traefik.png
            siteMonitor: https://traefik.bijouxlabs.cc/ping
        - Uptime Kuma:
            href: https://uptime.bijouxlabs.cc
            description: Uptime monitoring
            icon: uptime-kuma.png
            siteMonitor: https://uptime.bijouxlabs.cc
        - Longhorn:
            href: http://192.168.0.168
            description: Distributed block storage
            icon: longhorn.png
            siteMonitor: http://192.168.0.168
        - Grafana:
            href: https://grafana.bijouxlabs.cc
            description: Cluster metrics & dashboards
            icon: grafana.png
            siteMonitor: https://grafana.bijouxlabs.cc

    - Automation:
        - n8n:
            href: https://n8n.bijouxlabs.cc
            description: Self-hosted n8n
            icon: n8n.png
            siteMonitor: https://n8n.bijouxlabs.cc
        - Home Assistant:
            href: https://homeassistant.bijouxlabs.cc
            description: Self-hosted Home Assistant
            icon: home-assistant.png
            siteMonitor: https://homeassistant.bijouxlabs.cc

    - Proxmox:
        - Proxmox:
            href: https://proxmox.bijouxlabs.cc
            description: Hypervisor cluster
            icon: proxmox.png
            siteMonitor: https://proxmox.bijouxlabs.cc
        - node01m910:
            href: https://node01m910.bijouxlabs.cc
            description: Proxmox node 01
            icon: proxmox.png
        - node02m910:
            href: https://node02m910.bijouxlabs.cc
            description: Proxmox node 02
            icon: proxmox.png
        - node03m920:
            href: https://node03m920.bijouxlabs.cc
            description: Proxmox node 03
            icon: proxmox.png
        - node04g4800:
            href: https://node04g4800.bijouxlabs.cc
            description: Proxmox node 04
            icon: proxmox.png

  bookmarks.yaml: |
    - Cluster:
        - GitHub Repo:
            - href: https://github.com/AngelobRSA/k3s_selfhosted
              icon: github.png
        - Flux Dashboard:
            - href: https://github.com/AngelobRSA/k3s_selfhosted/actions
              icon: github-actions.png

  kubernetes.yaml: |
    mode: cluster
  docker.yaml: |
