apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: $(NAMESPACE_APPLICATIONS)
  annotations:
    metallb.universe.tf/loadBalancerIPs: $(LB_IP_HOMEASSISTANT)
spec:
  type: LoadBalancer
  selector:
    app: home-assistant
  ports:
    - name: http
      port: 8123
      targetPort: 8123
