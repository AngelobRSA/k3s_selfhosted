apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      nodeSelector:
        kubernetes.io/hostname: kworker01
      containers:
        - name: homeassistant
          image: homeassistant/home-assistant:2026.7.3
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8123
          env:
            - name: TZ
              value: Africa/Johannesburg
          volumeMounts:
            - mountPath: /config
              name: config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
