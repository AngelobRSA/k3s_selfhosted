apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 12h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  releaseName: kube-prometheus-stack
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "67.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  interval: 30m
  values:
    # k3s embeds these components and does not expose their metrics endpoints
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    prometheus:
      prometheusSpec:
        scrapeInterval: 30s
        retention: 30d
        additionalScrapeConfigs:
          - job_name: proxmox-node-exporter
            static_configs:
              - targets: ['192.168.0.110:9100']
                labels:
                  nodename: proxmox
              - targets: ['192.168.0.211:9100']
                labels:
                  nodename: node01m910
              - targets: ['192.168.0.212:9100']
                labels:
                  nodename: node02m910
              - targets: ['192.168.0.213:9100']
                labels:
                  nodename: node03m920
              - targets: ['192.168.0.214:9100']
                labels:
                  nodename: node04g4800
          - job_name: proxmox-smartctl
            static_configs:
              - targets: ['192.168.0.110:9633']
                labels:
                  nodename: proxmox
              - targets: ['192.168.0.211:9633']
                labels:
                  nodename: node01m910
              - targets: ['192.168.0.212:9633']
                labels:
                  nodename: node02m910
              - targets: ['192.168.0.213:9633']
                labels:
                  nodename: node03m920
              - targets: ['192.168.0.214:9633']
                labels:
                  nodename: node04g4800
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-single
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 25Gi

    grafana:
      fullnameOverride: grafana
      grafana.ini:
        server:
          root_url: https://grafana.bijouxlabs.cc
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
          traefik.ingress.kubernetes.io/router.tls.certresolver: cloudflare
        hosts:
          - grafana.bijouxlabs.cc
        tls:
          - hosts:
              - grafana.bijouxlabs.cc
